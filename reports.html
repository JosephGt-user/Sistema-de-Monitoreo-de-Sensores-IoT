<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroIoT | Reportes Avanzados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .reports-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .report-filters {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        
        body.dark .report-filters {
            background: #1e293b;
        }
        
        .report-group {
            flex: 1;
            min-width: 150px;
        }
        
        .report-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .report-group input, .report-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
        }
        
        body.dark .report-group input,
        body.dark .report-group select {
            background: #0f172a;
            border-color: #334155;
            color: white;
        }
        
        .report-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .report-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        
        body.dark .report-card {
            background: #1e293b;
        }
        
        .report-card .value {
            font-size: 2rem;
            font-weight: bold;
            color: #22c55e;
        }
        
        .chart-large {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        body.dark .chart-large {
            background: #1e293b;
        }
        
        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="reports-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-seedling"></i>
                <h1>AgroIoT <span class="badge-pro">REPORTES</span></h1>
            </div>
            <div class="header-controls">
                <div class="user-info"><i class="fas fa-user"></i><span id="userName"></span></div>
                <button class="icon-btn" id="themeToggleBtn"><i class="fas fa-moon"></i></button>
                <button class="icon-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Volver</button>
                <button class="icon-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>
        
        <div class="report-filters">
            <div class="report-group"><label>Desde</label><input type="date" id="startDate"></div>
            <div class="report-group"><label>Hasta</label><input type="date" id="endDate"></div>
            <div class="report-group"><label>Zona</label><select id="reportZone"><option value="all">Todas</option><option value="norte">Norte</option><option value="sur">Sur</option><option value="este">Este</option><option value="oeste">Oeste</option></select></div>
            <div class="report-group"><label>Tipo de reporte</label><select id="reportType"><option value="temperature">Temperatura</option><option value="soil">Humedad Suelo</option><option value="light">Luz Solar</option><option value="ph">pH</option></select></div>
            <button class="icon-btn" id="generateReportBtn" style="background:#22c55e; color:white;">Generar Reporte</button>
        </div>
        
        <div class="report-cards" id="reportCards">
            <div class="report-card"><h3>Promedio</h3><div class="value" id="avgValue">--</div></div>
            <div class="report-card"><h3>Máximo</h3><div class="value" id="maxValue">--</div></div>
            <div class="report-card"><h3>Mínimo</h3><div class="value" id="minValue">--</div></div>
            <div class="report-card"><h3>Total Lecturas</h3><div class="value" id="totalReadingsReport">--</div></div>
        </div>
        
        <div class="chart-large"><canvas id="reportChart"></canvas></div>
        
        <div class="export-buttons">
            <button id="exportPDFBtn" class="icon-btn"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
            <button id="exportExcelBtn" class="icon-btn"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            <button id="printBtn" class="icon-btn"><i class="fas fa-print"></i> Imprimir</button>
        </div>
    </div>
    
    <script src="reports.js"></script>
</body>
</html>
