<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroIoT Enterprise | Sistema de Monitoreo Agrícola</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            padding: 20px;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: fadeInUp 0.6s ease;
        }
        
        body.dark .login-card {
            background: #1e293b;
            color: white;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #22c55e, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        
        .login-logo i {
            font-size: 2.8rem;
            color: white;
        }
        
        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .input-group .input-icon {
            position: relative;
        }
        
        .input-group .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        body.dark .input-group input {
            background: #0f172a;
            border-color: #334155;
            color: white;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }
        
        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.85rem;
        }
        
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #22c55e, #8b5cf6);
            border: none;
            padding: 14px;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .demo-credentials {
            margin-top: 24px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 16px;
            font-size: 0.8rem;
        }
        
        body.dark .demo-credentials {
            background: #0f172a;
        }
        
        .demo-credentials code {
            display: inline-block;
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 8px;
            margin: 4px;
        }
        
        body.dark .demo-credentials code {
            background: #1e293b;
            color: #22c55e;
        }
        
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        
        .theme-toggle-login {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
        }
        
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .role-option {
            flex: 1;
            padding: 12px;
            text-align: center;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .role-option.selected {
            border-color: #22c55e;
            background: #22c55e10;
        }
        
        .role-option i {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <button class="theme-toggle-login" id="themeToggleLogin">
        <i class="fas fa-moon"></i>
    </button>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-seedling"></i>
                </div>
                <h2>AgroIoT Enterprise</h2>
                <p>Sistema de Monitoreo Agrícola Inteligente</p>
            </div>
            
            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Correo electrónico</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="usuario@agroiot.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="rememberMe"> Recordarme
                    </label>
                    <a href="#" class="forgot-link" id="forgotPassword">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <div class="demo-credentials">
                <p><i class="fas fa-users"></i> Cuentas de demostración</p>
                <code>admin@agroiot.com</code> / <code>admin123</code>
                <code>gerente@agroiot.com</code> / <code>gerente123</code>
                <code>supervisor@agroiot.com</code> / <code>super123</code>
                <code>agricultor@agroiot.com</code> / <code>campo123</code>
            </div>
        </div>
    </div>
    
    <script>
        // Tema oscuro
        const themeToggle = document.getElementById('themeToggleLogin');
        const savedTheme = localStorage.getItem('agroiot_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('agroiot_theme', isDark ? 'dark' : 'light');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });
        
        // Usuarios del sistema
        const users = [
            { email: 'admin@agroiot.com', password: 'admin123', name: 'Administrador', role: 'admin', zone: 'all', farm: 'Todas', permissions: ['all'] },
            { email: 'gerente@agroiot.com', password: 'gerente123', name: 'Gerente General', role: 'manager', zone: 'all', farm: 'Todas', permissions: ['view', 'edit', 'reports', 'users'] },
            { email: 'supervisor@agroiot.com', password: 'super123', name: 'Supervisor Norte', role: 'supervisor', zone: 'norte', farm: 'Finca Norte', permissions: ['view', 'edit', 'reports'] },
            { email: 'agricultor@agroiot.com', password: 'campo123', name: 'Agricultor', role: 'farmer', zone: 'sur', farm: 'Finca Sur', permissions: ['view'] }
        ];
        
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                const sessionData = {
                    isLoggedIn: true,
                    user: user,
                    loginTime: new Date().toISOString(),
                    sessionId: Math.random().toString(36).substr(2, 16)
                };
                
                if (rememberMe) {
                    localStorage.setItem('agroiot_session', JSON.stringify(sessionData));
                } else {
                    sessionStorage.setItem('agroiot_session', JSON.stringify(sessionData));
                }
                
                // Redirigir según rol
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                errorText.textContent = 'Credenciales incorrectas. Intente nuevamente.';
                errorDiv.style.display = 'flex';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 3000);
            }
        });
        
        // Verificar sesión existente
        const existingSession = localStorage.getItem('agroiot_session') || sessionStorage.getItem('agroiot_session');
        if (existingSession) {
            try {
                const session = JSON.parse(existingSession);
                if (session.isLoggedIn) {
                    if (session.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            } catch(e) {}
        }
        
        // Forgot password
        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            alert('Solicitud de recuperación enviada. Contacte al administrador.');
        });
    </script>
</body>
</html>
